<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harappa Map RPG - Mobile Version</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            overflow: hidden; /* Phone par scrolling rokne ke liye */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            touch-action: none; /* Swipe gestures rokne ke liye */
        }
        
        #gameWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            image-rendering: pixelated; /* Retro look */
        }

        /* Mini Map Setting */
        #miniMapCanvas {
            position: absolute;
            top: 15px;
            left: 15px;
            border: 3px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            opacity: 0.9;
            width: 150px;
            height: 85px;
        }

        /* 🎮 Mobile D-Pad Buttons Styling */
        #dpad {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
        }

        .dpad-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .dpad-btn {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: none;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .dpad-btn:active {
            background-color: rgba(255, 255, 255, 0.6);
            border-color: white;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: bold;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 20;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="loading">Game Loading...<br><small>Map aur Character aa rahe hain</small></div>

    <div id="gameWrapper">
        <!-- Main Game Canvas -->
        <canvas id="mainGameCanvas" width="960" height="540"></canvas>
        
        <!-- Mini Map Canvas -->
        <canvas id="miniMapCanvas" width="200" height="110"></canvas>

        <!-- Mobile Controls (D-Pad) -->
        <div id="dpad">
            <div class="dpad-row">
                <div class="dpad-btn" id="btnUp">▲</div>
            </div>
            <div class="dpad-row">
                <div class="dpad-btn" id="btnLeft">◀</div>
                <div class="dpad-btn" id="btnDown">▼</div>
                <div class="dpad-btn" id="btnRight">▶</div>
            </div>
        </div>
    </div>

    <script>
        const mainCanvas = document.getElementById('mainGameCanvas');
        const ctxMain = mainCanvas.getContext('2d');
        const miniMapCanvas = document.getElementById('miniMapCanvas');
        const ctxMini = miniMapCanvas.getContext('2d');
        const loadingScreen = document.getElementById('loading');

        // Game Settings
        const game = {
            zoom: 2.5,
            keys: {},
            collisionData: null
        };

        // Player Details
        const player = {
            worldX: 500, 
            worldY: 300, 
            width: 40,
            height: 40,
            speed: 5
        };

        // Naya Character Load Karna (Knight PNG)
        const playerImg = new Image();
        playerImg.crossOrigin = "Anonymous";
        playerImg.src = "https://img.icons8.com/color/96/000000/knight.png"; // Naya, clear RPG character

        // Map Load Karna
        const mapImg = new Image();
        mapImg.crossOrigin = "Anonymous"; 
        mapImg.src = "https://iili.io/CEwmKpj.jpg"; 

        // ⌨️ Keyboard Controls Track Karna
        window.addEventListener('keydown', (e) => game.keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => game.keys[e.key.toLowerCase()] = false);

        // 📱 Mobile Button Controls (Touch & Click)
        function bindButton(btnId, keyName) {
            const btn = document.getElementById(btnId);
            
            const press = (e) => { e.preventDefault(); game.keys[keyName] = true; };
            const release = (e) => { e.preventDefault(); game.keys[keyName] = false; };
            
            // Mouse ke liye (agar PC par buttons click karein)
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
            
            // Touch screen ke liye (Phone par)
            btn.addEventListener('touchstart', press, { passive: false });
            btn.addEventListener('touchend', release, { passive: false });
        }

        bindButton('btnUp', 'w');
        bindButton('btnDown', 's');
        bindButton('btnLeft', 'a');
        bindButton('btnRight', 'd');

        // Loading Logic
        let imagesLoaded = 0;
        playerImg.onload = checkLoad;
        mapImg.onload = checkLoad;

        function checkLoad() {
            imagesLoaded++;
            if (imagesLoaded === 2) {
                loadingScreen.style.display = "none";
                setupCollisionMask();
                gameLoop();
            }
        }

        // Pani (Water) ki Collision Set karna
        function setupCollisionMask() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = mapImg.width;
            tempCanvas.height = mapImg.height;
            const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });
            tempCtx.drawImage(mapImg, 0, 0);
            
            try {
                game.collisionData = tempCtx.getImageData(0, 0, mapImg.width, mapImg.height).data;
            } catch (e) {
                console.log("CORS error: Water collision might not work locally. Game will still run.");
                game.collisionData = null;
            }
        }

        function isWalkable(x, y) {
            if (!game.collisionData) return true; 
            
            if (x < 0 || y < 0 || x >= mapImg.width || y >= mapImg.height) return false;

            const pixelIndex = (Math.floor(y) * mapImg.width + Math.floor(x)) * 4;
            const r = game.collisionData[pixelIndex];
            const g = game.collisionData[pixelIndex + 1];
            const b = game.collisionData[pixelIndex + 2];

            // Agar blue zyada hai (Nadi / Paani)
            if (b > 130 && r < 120 && g < 130) {
                return false; 
            }
            return true;
        }

        function update() {
            let nextX = player.worldX;
            let nextY = player.worldY;

            if (game.keys['w'] || game.keys['arrowup']) nextY -= player.speed;
            if (game.keys['s'] || game.keys['arrowdown']) nextY += player.speed;
            if (game.keys['a'] || game.keys['arrowleft']) nextX -= player.speed;
            if (game.keys['d'] || game.keys['arrowright']) nextX += player.speed;

            let canMoveX = isWalkable(nextX, player.worldY);
            let canMoveY = isWalkable(player.worldX, nextY);

            if (canMoveX) player.worldX = nextX;
            if (canMoveY) player.worldY = nextY;

            player.worldX = Math.max(player.width/2, Math.min(mapImg.width - player.width/2, player.worldX));
            player.worldY = Math.max(player.height/2, Math.min(mapImg.height - player.height/2, player.worldY));
        }

        function drawMainGame() {
            ctxMain.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            ctxMain.imageSmoothingEnabled = false;

            let cameraX = player.worldX - (mainCanvas.width / game.zoom) / 2;
            let cameraY = player.worldY - (mainCanvas.height / game.zoom) / 2;

            cameraX = Math.max(0, Math.min(mapImg.width - mainCanvas.width / game.zoom, cameraX));
            cameraY = Math.max(0, Math.min(mapImg.height - mainCanvas.height / game.zoom, cameraY));

            ctxMain.save();
            ctxMain.scale(game.zoom, game.zoom);
            ctxMain.translate(-cameraX, -cameraY);

            ctxMain.drawImage(mapImg, 0, 0);

            // Naya Character Draw karna
            ctxMain.drawImage(
                playerImg, 
                player.worldX - player.width / 2, 
                player.worldY - player.height / 2, 
                player.width, 
                player.height
            );

            ctxMain.restore();
        }

        function drawMiniMap() {
            ctxMini.clearRect(0, 0, miniMapCanvas.width, miniMapCanvas.height);
            
            ctxMini.drawImage(mapImg, 0, 0, mapImg.width, mapImg.height, 0, 0, miniMapCanvas.width, miniMapCanvas.height);

            const scaleX = miniMapCanvas.width / mapImg.width;
            const scaleY = miniMapCanvas.height / mapImg.height;
            const miniPlayerX = player.worldX * scaleX;
            const miniPlayerY = player.worldY * scaleY;

            ctxMini.beginPath();
            ctxMini.arc(miniPlayerX, miniPlayerY, 4, 0, Math.PI * 2);
            ctxMini.fillStyle = 'red';
            ctxMini.fill();
            ctxMini.strokeStyle = 'white';
            ctxMini.lineWidth = 1.5;
            ctxMini.stroke();
            ctxMini.closePath();
        }

        function gameLoop() {
            update();
            drawMainGame();
            drawMiniMap();
            requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
